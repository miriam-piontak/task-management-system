<div class="tasks-wrapper">

  <div class="tasks-header">
    <h2>רשימת המשימות שלי</h2>
    <p>כל המשימות שלך במקום אחד</p>
  </div>

  <div class="tasks-grid">

    @for(y of myTasks; track $index; let i=$index){
      @if(y.userEmail == connectedUserEmail){

        <div class="task-card">

          <div class="color-bar" [style.background]="y.color"></div>

          <div class="task-content">

            <div class="task-top">
              <span class="badge">#{{i+1}}</span>
            </div>

            <h3>{{y.description}}</h3>

          </div>

        </div>

      }
    }

  </div>

</div>
