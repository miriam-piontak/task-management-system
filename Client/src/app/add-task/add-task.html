<div class="page">
  <div class="left-hero"></div>

  <div class="form-side">
    <div class="add-task-container">
      <h2>הוספת משימה חדשה</h2>

      <div class="form-group">
        <label>תיאור המשימה:</label>
        <input type="text" [(ngModel)]="description">
      </div>

      <div class="form-group">
        <label>תאריך ביצוע:</label>
        <input type="date" [(ngModel)]="date">
      </div>

      <div class="form-group">
        <label>בחר צבע ללוח השנה:</label>
        <input type="color" [(ngModel)]="color">
      </div>

      <div class="form-group">
        <label>קטגוריה:</label>
        <select [(ngModel)]="taskTypeId">
          <option [ngValue]="null">בחר קטגוריה</option>
          @for (type of taskTypes; track $index) {
            <option [ngValue]="type.code">{{ type.typeName }}</option>
          }
        </select>
      </div>

      <button class="save-btn" (click)="saveTask()">שמור</button>
    </div>
  </div>
</div>
